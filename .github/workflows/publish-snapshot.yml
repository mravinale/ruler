name: Publish snapshot to npm

# Snapshot publishes for the `next` dist-tag. Fires on every push to main.
# Each commit produces a unique prerelease version so npm never rejects
# with "cannot publish over previously published version". The `latest`
# dist-tag is untouched and continues to track tagged releases via
# `release.yml` — `npm install @mravinale/ruler` keeps installing the
# stable release, while `npm install @mravinale/ruler@next` pulls the
# latest snapshot.
#
# Skip a publish for a specific commit by including `[skip ci]` or
# `[skip publish]` in the commit message.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Serialize publishes so two pushes can't race on the same dist-tag.
concurrency:
  group: publish-snapshot
  cancel-in-progress: false

jobs:
  publish-snapshot:
    name: Publish snapshot to npm `next` dist-tag
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[skip publish]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: 'https://registry.npmjs.org/'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Compute snapshot version
        id: snap
        run: |
          BASE=$(node -p "require('./package.json').version.split('-')[0]")
          SHA=$(git rev-parse --short HEAD)
          VERSION="${BASE}-main.${{ github.run_number }}.${SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Computed snapshot version: ${VERSION}"

      - name: Set package version (no commit)
        run: npm version "${{ steps.snap.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Publish to npm with `next` dist-tag
        run: npm publish --access public --tag next
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Job summary
        run: |
          {
            echo "### 📦 Snapshot published"
            echo ""
            echo "| Field   | Value |"
            echo "| ------- | ----- |"
            echo "| Version | \`${{ steps.snap.outputs.version }}\` |"
            echo "| Tag     | \`next\` |"
            echo "| Install | \`npm install @mravinale/ruler@next\` |"
            echo "| Commit  | \`$(git rev-parse --short HEAD)\` |"
          } >> "$GITHUB_STEP_SUMMARY"
